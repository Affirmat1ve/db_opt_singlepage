<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Single Page App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#module0" class="nav-link active">Модуль 0</a></li>
                <li><a href="#module1" class="nav-link">Модуль 1</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="module0" class="page active">
            <h1>Секция 0</h1>
            <p>Теория и тест по ClickHouse</p>

            <iframe src="m1.html" width="100%" height="800"> </iframe>

            <div class="quiz-container" id="quizApp">
                <div style="display: flex; justify-content: space-between; align-items: baseline;">
                    <h1>Тест </h1>
                    <button class="restart-btn" id="restartHeadBtn" title="начать заново">↻ заново</button>
                </div>

                <!-- главная панель с вопросом и вариантами -->
                <div class="question-panel">
                    <div class="question-text" id="questionDisplay">Загрузка...</div>
                    <div class="options-grid" id="optionsContainer"></div>
                </div>

                <!-- фидбек + очки + навигация -->
                <div class="feedback-bar">
                    <div class="message-box" id="feedbackMessage">Выберите вариант</div>
                    <div class="score-badge" id="scoreDisplay">⭐ <span id="scoreValue">0</span> / <span id="totalQuestions">0</span></div>
                </div>

                <div class="nav-buttons">
                    <button class="secondary" id="prevBtn" disabled>◀ Назад</button>
                    <button class="primary" id="nextBtn" disabled>Далее ▶</button>
                </div>
                <footer>
                    <small style="color:#385a8a; opacity:0.8;">каждый вопрос — 4 варианта · одинарный выбор</small>
                </footer>
            </div>
        </section>

        <section id="module1" class="page">
            <h1>Секция 1</h1>
            <p>Теория и тест по ClickHouse</p>
            <iframe src="m2.html" width="100%" height="800"> </iframe>
        </section>

        <section id="contact" class="page">
            <h1>Contact</h1>
            <form id="contactForm">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
