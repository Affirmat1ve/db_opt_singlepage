<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Single Page App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home" class="nav-link active">Home</a></li>
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="page active">
            <h1>Welcome to My Site</h1>
            <p>This is the home section of my single-page website.</p>
            <button id="colorBtn">Change Background</button>
        </section>

        <section id="about" class="page">
            <h1>About Me</h1>
            <p>This is the about section with some information about me.</p>
        </section>

        <section id="contact" class="page">
            <h1>Contact</h1>
            <form id="contactForm">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
        <div class="quiz-container" id="quizApp">
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <h1>✔️ викторина <span>4 ответа</span></h1>
                <button class="restart-btn" id="restartHeadBtn" title="начать заново">↻ заново</button>
            </div>

            <!-- главная панель с вопросом и вариантами -->
            <div class="question-panel">
                <div class="question-text" id="questionDisplay">Загрузка...</div>
                <div class="options-grid" id="optionsContainer"></div>
            </div>

            <!-- фидбек + очки + навигация -->
            <div class="feedback-bar">
                <div class="message-box" id="feedbackMessage">Выберите вариант</div>
                <div class="score-badge" id="scoreDisplay">⭐ <span id="scoreValue">0</span> / <span id="totalQuestions">0</span></div>
            </div>

            <div class="nav-buttons">
                <button class="secondary" id="prevBtn" disabled>◀ Назад</button>
                <button class="primary" id="nextBtn" disabled>Далее ▶</button>
            </div>
            <footer>
                <small style="color:#385a8a; opacity:0.8;">каждый вопрос — 4 варианта · одинарный выбор</small>
            </footer>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
